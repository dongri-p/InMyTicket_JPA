spring:
  profiles:
    default: local
  jpa:
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        default_batch_fetch_size: 100

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000

kopis:
  api-key: ${KOPIS_API_KEY}
  base-url: http://www.kopis.or.kr/openApi/restful

admin:
  login-id: ${ADMIN_LOGIN_ID}
  password: ${ADMIN_PASSWORD}

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
