spring:
  profiles:
    default: local
  jpa:
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        default_batch_fetch_size: 100

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000

kopis:
  api-key: ${KOPIS_API_KEY}
  base-url: http://www.kopis.or.kr/openApi/restful

admin:
  login-id: ${ADMIN_LOGIN_ID}
  password: ${ADMIN_PASSWORD}

reservation:
  # 결제 없이 이 시간(분)이 지난 PENDING 예약은 좌석을 자동 회수함
  pending-timeout-minutes: 10
  # 자동 회수 스케줄러 실행 주기(ms)
  expiration-check-interval-ms: 60000

cors:
  # 프런트엔드가 붙는 도메인 목록(콤마 구분). 운영 배포 시 CORS_ALLOWED_ORIGINS 환경변수로 실제 프런트엔드 도메인을 지정할 것
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
