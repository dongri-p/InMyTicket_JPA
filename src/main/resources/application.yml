spring:
  profiles:
    default: local
  jpa:
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        default_batch_fetch_size: 100

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000

kopis:
  api-key: ${KOPIS_API_KEY}
  base-url: http://www.kopis.or.kr/openApi/restful

admin:
  login-id: ${ADMIN_LOGIN_ID}
  password: ${ADMIN_PASSWORD}

reservation:
  # 결제 없이 이 시간(분)이 지난 PENDING 예약은 좌석을 자동 회수함
  pending-timeout-minutes: 10
  # 자동 회수 스케줄러 실행 주기(ms)
  expiration-check-interval-ms: 60000
