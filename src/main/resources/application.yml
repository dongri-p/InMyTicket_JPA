spring:
  profiles:
    default: local
  jpa:
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        default_batch_fetch_size: 100

jwt:
  secret: ${JWT_SECRET:inmyticket-secret-key-must-be-at-least-32-chars-long}
  expiration: 3600000

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
